<!DOCTYPE html>
<html><title>project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
  rel="stylesheet">

<head>
  <style>
* {box-sizing: border-box;}



    .profile {
      border-radius: 800px;
      width: 100px;
      place-items: center;
      margin-bottom: 20px;
      margin-top: 70px;



    }

    .client1 {
      font-family: Inter, sans-serif;
      color: white;
      font-size: 40px;
      font-weight: 400;
      margin-bottom: 0px;
      margin: 0 !important;
      margin-top: 0px;
      margin-bottom: 30px;
    }

    .location1 {
      color: rgb(187, 246, 87);
      font-family: Inter, sans-serif;
      font-size: 23px;

      margin-top: 10px;
      margin-bottom: 30px;
    }

    .description1 {
      color: white;
      font-family: Inter, sans-serif;
      font-size: 23px;
      font-weight: 200;

      line-height: 20px;

      margin-bottom: 30px;

    }

    .project {
      background-color: rgb(46, 44, 44);
      display: inline-block;
      vertical-align: center;
      border-radius: 15px;
      width: 500px;
      display: table-cell;
      vertical-align: middle;
      text-align: center;margin-top: 20px;





      place-items: center;
    }

    .button1 {
      color: white;
      border: none;
      width: 430px;
      background-color: rgb(70, 69, 69);
      font-weight: 700;
      font-size: 15px;
      font-family: Inter, sans-serif;
      height: 45px;
      border-radius: 7px;

      margin-bottom: 15px;
    }

    .button1:hover {
      cursor: pointer;
      opacity: 0.7;
      transition: 0.7s;
    }

    .button1:active {
      opacity: 0.5;
      transition: 0.7;
    }

    .wrapper {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      place-items: center;
      align-items: center;
    }
  </style>
</head>

<body style="background-color: rgb(27, 26, 26);">
  <div class="wrapper">
    <div class="project">
      <div class="avatar">
        <img class="profile" src="avatar-jessica.jpeg">
      </div>
      <div class="client">
        <p class="client1">Jessica Randall</p>
      </div>
      <div class="location">
        <p class="location1">London,United Kingdom</p>
      </div>
      <div class="description">
        <p class="description1">"Front-end developer and avid reader."</p>
      </div>
      <div class="project">
        <div class="platform"><button class="button1">
            GitHub</button></div>
        <div>
          <div><button class="button1">Frontend Mentor</button></div>
          <div><button class="button1">Linkedln</button></div>
          <div><button class="button1">Twitter</button></div>
          <div style="margin-bottom:20px;"><button class="button1">Instagarm</button></div>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
